<app-topbar></app-topbar>
<div class="container">

  <div class="searchbar">
    <input spellcheck="false" (keydown.code.enter)="search()" [(ngModel)]="searchParameter.text" placeholder="Search ..." >


  </div>

  @if(isLoading ) {
    <div class="loading-container">
      <div class="load"></div>
    </div>
    }

  <div class="items" *ngIf="!isLoading">
    @for (arc of data; track $index) {
    <app-item [name]="arc.name" [desc]="arc.description" [img]="arc.icon" [id]="arc.id" route="arc/{{ arc.id }}"  ></app-item>
    }
  </div>
<div *ngIf="!isLoading" class="pages" >
    <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="first"
    [rows]="rows"
    [totalRecords]="120"
    [rowsPerPageOptions]="[10, 20, 30]"
    />
</div>
  <br>
  <br>
</div>
